spring.application.name=back


# Database
spring.datasource.url=jdbc:mysql://localhost:3306/quoteguard?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

# JWT
# 512-bit Base64-encoded secret key (change in production)
jwt.secret=${JWT_SECRET}
jwt.access-token-validity-seconds=18000
# Refresh Token: 7일
jwt.refresh-token-validity-seconds=604800

# CORS (콤마로 구분해 여러 origin 지정 가능, 예: https://a.com,https://www.a.com)
cors.allowed-origin=${CORS_ALLOWED_ORIGIN:http://localhost:5173}

# Mail (SMTP)
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
mail.from-address=${MAIL_FROM:${MAIL_USERNAME}}

mail.from-name=${MAIL_FROM_NAME:QuoteGuard}
spring.profiles.include=secret

# Account
account.email-domain=quoteguard.com

# File Storage (local | s3)
app.storage.type=${STORAGE_TYPE:local}
app.storage.public-base-url=${STORAGE_PUBLIC_BASE_URL:http://localhost:8080}
# local
app.storage.local.dir=${STORAGE_LOCAL_DIR:./uploads}
# s3 (app.storage.type=s3 일 때 사용) — 필수값은 기본값 없음 → 누락 시 startup 실패(로컬 모드면 미주입이라 무관)
app.storage.s3.bucket=${S3_BUCKET}
app.storage.s3.region=${S3_REGION:ap-northeast-2}
app.storage.s3.access-key=${AWS_ACCESS_KEY_ID}
app.storage.s3.secret-key=${AWS_SECRET_ACCESS_KEY}
# CloudFront 등 커스텀 도메인 사용 시에만 (없으면 표준 S3 URL 자동)
app.storage.s3.public-url=${S3_PUBLIC_URL:}

# Multipart (전역 — Spring 한도는 앱 검증보다 약간 크게. 영상 300MB·이미지 5MB는 Storage 코드에서 검증)
spring.servlet.multipart.max-file-size=305MB
spring.servlet.multipart.max-request-size=315MB

# Gemini
gemini.api-key=${GEMINI_API_KEY:}
# gemini-2.0-flash는 2026-06-01부로 종료(deprecated)되어 호출 시 오류가 발생하므로 2.5 계열을 기본값으로 사용
gemini.model=${GEMINI_MODEL:gemini-2.5-flash}

# Groq (Gemini 호출 한도 초과 시 AI 리스크 요약 fallback)
groq.api-key=${GROQ_API_KEY:}
# llama-3.3-70b-versatile는 2026-08-16 종료 예정이므로 gpt-oss-120b를 기본값으로 사용
groq.model=${GROQ_MODEL:openai/gpt-oss-120b}

# Password Reset
app.frontend-url=${APP_FRONTEND_URL:http://localhost:5173}
app.password-reset-token-expiry-minutes=30
# 신뢰할 수 있는 리버스 프록시 뒤에 배포된 경우에만 true로 설정 (X-Forwarded-For 신뢰 여부)
app.trust-proxy-headers=false

# Initial Password Setup
app.initial-password-token-expiry-minutes=1440

# Approval
approval.sla.days=2
