spring.application.name=back

# Database
spring.datasource.url=jdbc:mysql://localhost:3306/quoteguards?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT
# 512-bit Base64-encoded secret key (change in production)
jwt.secret=YOUR_LOCAL_SECRET_KEY_MUST_BE_HERE_AT_LEAST_64_BYTES
jwt.access-token-validity-seconds=18000
