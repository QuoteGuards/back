spring.application.name=back

# Database
spring.datasource.url=jdbc:mysql://localhost:3306/quoteguard?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

# JWT
# 512-bit Base64-encoded secret key (change in production)
jwt.secret=${JWT_SECRET}
jwt.access-token-validity-seconds=18000

# CORS
cors.allowed-origin=http://localhost:5173

# Mail (SMTP)
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
mail.from-address=${MAIL_FROM:${MAIL_USERNAME}}

mail.from-name=${MAIL_FROM_NAME:QuoteGuard}
spring.profiles.include=secret
gemini.api-key=${GEMINI_API_KEY:}

