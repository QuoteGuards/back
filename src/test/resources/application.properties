# ── 테스트 환경 전용 프로퍼티 ──────────────────────────────────────────────
# 이 파일은 src/main/resources/application.properties와 .env 값을 테스트 시 덮어씁니다.

# Database - 로컬 테스트 DB (환경변수 없이도 동작하도록 기본값 제공)
spring.datasource.url=jdbc:mysql://localhost:3306/quoteguard?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
spring.datasource.username=${DB_USERNAME:quoteguard}
spring.datasource.password=${DB_PASSWORD:quoteguard}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=none

# JWT
jwt.secret=${JWT_SECRET:dGVzdC1zZWNyZXQta2V5LWZvci10ZXN0LWVudmlyb25tZW50LW9ubHktcGxlYXNlLWNoYW5nZS1pbi1wcm9kdWN0aW9u}
jwt.access-token-validity-seconds=3600

# Mail
# - spring.mail.host가 있어야 JavaMailSender 빈이 생성됨
# - mail.from-address는 @Value에 default가 없으므로 반드시 명시
# - test-connection=false로 실제 SMTP 연결 방지
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.test-connection=false
mail.from-address=${MAIL_USERNAME}

# Account
account.email-domain=quoteguard.com
