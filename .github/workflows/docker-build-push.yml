name: Docker Build & Push

# main 브랜치에 push되면 백엔드 Docker 이미지를 빌드해 GHCR에 푸시하고,
# 배포 서버에 SSH로 접속해 새 이미지로 컨테이너를 갱신한다.
# 테스트는 Dockerfile 빌드 단계(-x test)에서 실행하지 않으므로,
# 이 워크플로우는 빌드/배포만 담당하고 테스트 검증은 별도 워크플로우(PR 단계 등)에서 처리한다.

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: quoteguards/back

concurrency:
  group: docker-build-push-back-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image-tag: ${{ steps.meta.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,format=long

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to server
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      # GHCR 패키지(quoteguards/back)를 public으로 설정했으므로 배포 서버에서
      # 별도 docker login 없이 바로 pull 가능하다.
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USERNAME }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          script: |
            set -e
            cd ${{ secrets.DEPLOY_PATH }}
            # deploy/.env의 BACKEND_IMAGE를 이번 커밋 SHA 태그로 갱신해
            # docker-compose.yml이 정확히 이 빌드를 pull하도록 고정한다(롤백 시 이전 SHA로 되돌리면 됨).
            IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}"
            if grep -q '^BACKEND_IMAGE=' .env; then
              sed -i "s#^BACKEND_IMAGE=.*#BACKEND_IMAGE=${IMAGE}#" .env
            else
              echo "BACKEND_IMAGE=${IMAGE}" >> .env
            fi
            docker compose pull back
            docker compose up -d back
            docker image prune -f
